<!DOCTYPE html>
<html>
<head>
  <title>HOTNFT</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="background:#0b0f2a;color:white;font-family:sans-serif;text-align:center">

<h2>HOTNFT Wallet</h2>

<!-- LOGIN -->
<div id="loginBox">
  <input id="email" placeholder="Email"><br><br>
  <input id="password" type="password" placeholder="Password"><br><br>
  <button onclick="signup()">Signup</button>
  <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none">
  <h3>Dashboard</h3>
  <p id="userEmail"></p>

  <h4>Deposit</h4>
  <input id="depAmount" placeholder="Amount"><br><br>
  <button onclick="deposit()">Submit Deposit</button>

  <h4>Withdraw</h4>
  <input id="withAmount" placeholder="Amount"><br><br>
  <button onclick="withdraw()">Submit Withdraw</button>

  <br><br>
  <button onclick="logout()">Logout</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDvbplgsoy0Nb37fbE_e1CdbWt8GKq_4Q",
  authDomain: "hotnft-app.firebaseapp.com",
  projectId: "hotnft-app",
  storageBucket: "hotnft-app.firebasestorage.app",
  messagingSenderId: "226518368288",
  appId: "1:226518368288:web:a9002e1316b129258803d5"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

window.signup = async () => {
  try {
    await createUserWithEmailAndPassword(auth, email.value, password.value);
    alert("Signup Success");
  } catch(e) {
    alert(e.message);
  }
};

window.login = async () => {
  try {
    await signInWithEmailAndPassword(auth, email.value, password.value);
  } catch(e) {
    alert(e.message);
  }
};

window.logout = async () => {
  await signOut(auth);
};

onAuthStateChanged(auth, (user) => {
  if(user){
    loginBox.style.display="none";
    dashboard.style.display="block";
    userEmail.innerText = user.email;
  } else {
    loginBox.style.display="block";
    dashboard.style.display="none";
  }
});

window.deposit = async () => {
  await addDoc(collection(db, "deposits"), {
    user: auth.currentUser.email,
    amount: depAmount.value,
    status: "pending"
  });
  alert("Deposit request sent");
};

window.withdraw = async () => {
  await addDoc(collection(db, "withdraws"), {
    user: auth.currentUser.email,
    amount: withAmount.value,
    status: "pending"
  });
  alert("Withdraw request sent");
};
</script>

</body>
</html>
